<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSON → Excel (id, question, rightanswer, wrong1, wrong2, wrong3, block)</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:#f6f8fb;padding:24px}
    .card{max-width:980px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    textarea{width:100%;height:260px;padding:12px;border:1px solid #e6e9ef;border-radius:6px;font-family:inherit}
    .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:6px;border:0;cursor:pointer}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-muted{background:#eef2ff;color:#111}
    .btn-danger{background:#ef4444;color:#fff}
    pre{background:#0b1220;color:#dbeafe;padding:12px;border-radius:6px;max-height:320px;overflow:auto}
    label{font-weight:600}
    .small{font-size:13px;color:#6b7280}
    .row{display:flex;gap:8px;align-items:center}
    .error{color:#c33;margin-top:8px}
    .info{color:#0c5aa0;margin-top:8px}
    .top-link{float:right;margin-bottom:12px}
    a.top-link{color:#3b82f6;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div class="top-link"><a class="top-link" href="index.html">Manage quiz data</a></div>
    <h2>JSON → Excel</h2>
    <div class="small">Accepts an array of objects with keys: <strong>id, question, rightanswer, wrong1, wrong2, wrong3, block</strong>. You can paste JSON or upload a .json file.</div>

    <div style="margin-top:12px">
      <input id="fileInput" type="file" accept=".json" />
    </div>

    <div style="margin-top:12px">
      <label for="jsonInput">JSON input</label>
      <textarea id="jsonInput" placeholder='Paste JSON array here, e.g. [ {"question":"...","rightanswer":"...","wrong1":"...","wrong2":"...","wrong3":"...","block":"..."} ]'></textarea>
    </div>

    <div style="margin-top:8px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <label><input type="checkbox" id="autoId" checked> Auto-generate missing `id`</label>
      <label class="small">Columns will be: <em>id, question, rightanswer, wrong1, wrong2, wrong3, block</em></label>
    </div>

    <div class="controls">
      <button id="convertBtn" class="btn-primary">Convert → Download .xlsx</button>
      <button id="previewBtn" class="btn-muted">Preview Table</button>
      <button id="clearBtn" class="btn-muted">Clear</button>
      <button id="validateBtn" class="btn-muted">Validate JSON</button>
      <button id="pasteToCrudBtn" class="btn-muted">Push to Quiz Manager</button>
    </div>

    <div id="msg" aria-live="polite"></div>

    <h3 style="margin-top:16px">Preview / Output</h3>
    <div id="previewArea"><pre id="preview">[]</pre></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const fileInput = document.getElementById('fileInput');
    const jsonInput = document.getElementById('jsonInput');
    const convertBtn = document.getElementById('convertBtn');
    const previewBtn = document.getElementById('previewBtn');
    const validateBtn = document.getElementById('validateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const msg = document.getElementById('msg');
    const preview = document.getElementById('preview');
    const autoId = document.getElementById('autoId');
    const pasteToCrudBtn = document.getElementById('pasteToCrudBtn');

    const HEADERS = ['id','question','rightanswer','wrong1','wrong2','wrong3','block'];

    fileInput.addEventListener('change', (e)=>{
      const f = e.target.files[0];
      if(!f) return;
      const r = new FileReader();
      r.onload = ()=>{ jsonInput.value = r.result; preview.textContent = '[]'; msg.textContent = ''; };
      r.readAsText(f, 'utf-8');
    });

    clearBtn.addEventListener('click', ()=>{ jsonInput.value = ''; preview.textContent = '[]'; msg.textContent=''; });

    validateBtn.addEventListener('click', ()=>{
      const res = parseAndNormalize();
      if(res.error){ msg.innerHTML = `<div class="error">${res.error}</div>`; return; }
      msg.innerHTML = `<div class="info">Valid JSON — ${res.items.length} items parsed.</div>`;
      preview.textContent = JSON.stringify(res.items, null, 2);
    });

    previewBtn.addEventListener('click', ()=>{
      const res = parseAndNormalize();
      if(res.error){ msg.innerHTML = `<div class="error">${res.error}</div>`; return; }
      // build simple HTML table preview
      const html = buildTableHtml(res.items);
      preview.innerHTML = html;
    });

    convertBtn.addEventListener('click', ()=>{
      const res = parseAndNormalize();
      if(res.error){ msg.innerHTML = `<div class="error">${res.error}</div>`; return; }
      if(res.items.length === 0){ msg.innerHTML = `<div class="error">No items to export</div>`; return; }
      // create worksheet with exact headers order
      const ws = XLSX.utils.json_to_sheet(res.items, { header: HEADERS });
      // ensure header row text casing
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
      const filename = `quiz-export-${new Date().toISOString().split('T')[0]}.xlsx`;
      XLSX.writeFile(wb, filename);
      msg.innerHTML = `<div class="info">Exported ${res.items.length} rows to ${filename}</div>`;
    });

    // Attempt to push converted data directly into quiz-crud app via localStorage
    pasteToCrudBtn.addEventListener('click', ()=>{
      const res = parseAndNormalize();
      if(res.error){ msg.innerHTML = `<div class="error">${res.error}</div>`; return; }
      if(res.items.length === 0){ msg.innerHTML = `<div class="error">No items to push</div>`; return; }
      // read existing from localStorage key used by quiz-crud
      const key = 'quizData';
      let existing = [];
      try{ existing = JSON.parse(localStorage.getItem(key) || '[]'); }catch(e){ existing = []; }
      // avoid id conflicts: if autoId option selected we will regenerate ids for all items
      if(autoId.checked){
        const start = existing.length>0 ? Math.max(...existing.map(d=>d.id)) : 0;
        let id = start;
        const withIds = res.items.map(it => ({ id: ++id, ...it }));
        existing = existing.concat(withIds);
      } else {
        // naive merge: keep incoming ids as-is; if collision, reassign
        const used = new Set(existing.map(d=>d.id));
        let maxId = existing.length>0 ? Math.max(...existing.map(d=>d.id)) : 0;
        const merged = res.items.map(it=>{
          if(typeof it.id === 'number' && !used.has(it.id)) { used.add(it.id); return it; }
          // reassign
          maxId += 1; return { ...it, id: maxId };
        });
        existing = existing.concat(merged);
      }
      localStorage.setItem(key, JSON.stringify(existing));
      msg.innerHTML = `<div class="info">Pushed ${res.items.length} items to Quiz Manager (localStorage key: ${key})</div>`;
    });

    function buildTableHtml(items){
      if(items.length===0) return '[]';
      const cols = HEADERS;
      let html = '<table style="width:100%;border-collapse:collapse">';
      html += '<thead><tr>' + cols.map(c=>`<th style="border:1px solid #ddd;padding:6px;background:#f3f4f6;text-align:left">'+c+'</th>`).join('') + '</tr></thead>';
      html += '<tbody>' + items.map(r=>'<tr>'+cols.map(c=>`<td style="border:1px solid #ddd;padding:6px">${escapeHtml(String(r[c]!==undefined? r[c]: ''))}</td>`).join('') + '</tr>').join('') + '</tbody>';
      html += '</table>';
      return html;
    }

    function escapeHtml(str){ return str.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])); }

    // parse JSON and normalize keys + auto-generate ids if requested
    function parseAndNormalize(){
      const raw = jsonInput.value.trim();
      if(!raw) return { items: [], error: null };
      let parsed;
      try{ parsed = JSON.parse(raw); }catch(e){ return { error: 'Invalid JSON: ' + e.message }; }
      if(!Array.isArray(parsed)) return { error: 'JSON must be an array of objects' };
      const items = [];
      for(const obj of parsed){
        if(typeof obj !== 'object' || obj === null) continue;
        // map fields case-insensitively
        const lower = {};
        for(const k of Object.keys(obj)) lower[k.toLowerCase()] = obj[k];
        // required fields check: question, rightanswer, wrong1/2/3
        if(typeof lower['question'] !== 'string' || typeof lower['rightanswer'] !== 'string' || typeof lower['wrong1'] !== 'string' || typeof lower['wrong2'] !== 'string' || typeof lower['wrong3'] !== 'string'){
          // skip invalid
          continue;
        }
        const entry = {
          id: (typeof lower['id'] === 'number') ? lower['id'] : undefined,
          question: lower['question'],
          rightanswer: lower['rightanswer'],
          wrong1: lower['wrong1'],
          wrong2: lower['wrong2'],
          wrong3: lower['wrong3'],
          block: (typeof lower['block'] === 'string') ? lower['block'] : (lower['block'] == null ? '' : String(lower['block']))
        };
        items.push(entry);
      }
      // auto-generate ids if requested
      if(autoId.checked){
        let id = 0; // start from 1
        return { items: items.map(it=>({ id: ++id, ...it })), error: null };
      }
      return { items, error: null };
    }
  </script>
</body>
</html>
