<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Markdown → Quiz JSON</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:#f6f8fb;padding:24px}
    .card{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    textarea{width:100%;height:320px;padding:12px;border:1px solid #e6e9ef;border-radius:6px;font-family:inherit}
    .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:6px;border:0;cursor:pointer}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-muted{background:#eef2ff;color:#111}
    pre{background:#0b1220;color:#dbeafe;padding:12px;border-radius:6px;max-height:360px;overflow:auto}
    label{font-weight:600}
    .row{display:flex;gap:8px;align-items:center}
    .small{font-size:13px;color:#6b7280}
    .error{color:#c33;margin-top:8px}
  </style>
</head>
<body>
  <div style="text-align:right;margin-bottom:12px;"><a href="index.html" style="color:#3b82f6;text-decoration:none;font-weight:600;">Manage quiz data</a></div>
  <div class="card">
    <h2>Markdown → Quiz JSON (H1=Block, H2=Question, "- +"=RightAnswer, "-"=Wrong)</h2>
    <div class="small">Format example:
      <pre># Chapter 1
## What is 2+2?
- + 4
- 3
- 5
- 6
</pre>
    </div>

    <label for="md">Markdown input</label>
    <textarea id="md" placeholder="Paste Markdown here..."></textarea>

    <div style="margin-top:8px;display:flex;gap:12px;align-items:center;">
      <label><input type="checkbox" id="genId" checked> Generate `id` field (auto-increment)</label>
      <span class="small">If unchecked, output will not include `id` properties unless present in source.</span>
    </div>

    <div class="controls">
      <button id="convert" class="btn-primary">Convert</button>
      <button id="copy" class="btn-muted">Copy JSON</button>
      <button id="download" class="btn-muted">Download JSON</button>
      <button id="clear" class="btn-muted">Clear</button>
    </div>

    <div id="errors" class="error" aria-live="polite"></div>

    <h3 style="margin-top:16px">JSON Output</h3>
    <pre id="out">[]</pre>
  </div>

  <script>
    function parseMarkdownToQuiz(mdText, options = { genId: true }){
      const lines = mdText.split(/\r?\n/);
      let currentBlock = '';
      let currentQuestion = null;
      const questions = [];

      function flushQuestion(){
        if(!currentQuestion) return;
        // pad wrongs to 3
        const wrongs = currentQuestion.wrongs.slice(0,3);
        while(wrongs.length < 3) wrongs.push('');

        const obj = {
          Question: currentQuestion.text || '',
          RightAnswer: currentQuestion.right || '',
          Wrong1: wrongs[0],
          Wrong2: wrongs[1],
          Wrong3: wrongs[2],
          Block: currentBlock || ''
        };
        questions.push(obj);
        currentQuestion = null;
      }

      for(let raw of lines){
        const line = raw.replace(/\u00A0/g,' ').trimEnd();
        if(!line) continue; // skip empty lines

        if(/^#\s+/.test(line)){
          // H1 -> Block
          // flush any running question
          flushQuestion();
          currentBlock = line.replace(/^#\s+/, '').trim();
          continue;
        }

        if(/^##\s+/.test(line)){
          // H2 -> Question
          // flush previous question
          flushQuestion();
          currentQuestion = { text: line.replace(/^##\s+/, '').trim(), right: null, wrongs: [] };
          continue;
        }

        // List items
        // Right answer marker: '- +' (dash, optional spaces, plus)
        if(/^-\s*\+\s*/.test(line)){
          const val = line.replace(/^-\s*\+\s*/, '').trim();
          if(!currentQuestion){
            // no question context -> ignore or could create with empty question
            currentQuestion = { text: '', right: val, wrongs: [] };
          } else {
            currentQuestion.right = val;
          }
          continue;
        }

        // Wrong answers: lines starting with '-' but not '- +'
        if(/^-\s+/.test(line)){
          const val = line.replace(/^-\s+/, '').trim();
          if(!currentQuestion){
            currentQuestion = { text: '', right: null, wrongs: [val] };
          } else {
            currentQuestion.wrongs.push(val);
          }
          continue;
        }

        // If line doesn't match any pattern, treat as continuation of question text if currentQuestion present
        if(currentQuestion && !currentQuestion.right && currentQuestion.wrongs.length===0){
          // append to question text
          currentQuestion.text += ' ' + line.trim();
        }
      }

      // flush last
      flushQuestion();

      // Validation: ensure each item has RightAnswer and at least one wrong (but we will pad wrongs to 3)
      const errors = [];
      questions.forEach((q, idx) => {
        if(!q.Question || q.Question.trim()===''){
          errors.push(`Question #${idx+1} has empty question text.`);
        }
        if(!q.RightAnswer || q.RightAnswer.trim()===''){
          errors.push(`Question #${idx+1} is missing RightAnswer.`);
        }
        const wrongCount = [q.Wrong1, q.Wrong2, q.Wrong3].filter(Boolean).length;
        if(wrongCount === 0){
          errors.push(`Question #${idx+1} has no wrong answers.`);
        }
      });

      // Optionally add ids
      if(options.genId){
        let id = 0;
        return { questions: questions.map(q => ({ id: ++id, ...q })), errors };
      }

      return { questions, errors };
    }

    // UI
    const mdBox = document.getElementById('md');
    const convertBtn = document.getElementById('convert');
    const out = document.getElementById('out');
    const copyBtn = document.getElementById('copy');
    const dlBtn = document.getElementById('download');
    const clearBtn = document.getElementById('clear');
    const genId = document.getElementById('genId');
    const errBox = document.getElementById('errors');

    convertBtn.addEventListener('click', ()=>{
      errBox.textContent = '';
      const res = parseMarkdownToQuiz(mdBox.value || '', { genId: genId.checked });
      if(res.errors.length) errBox.textContent = res.errors.join(' ');
      out.textContent = JSON.stringify(res.questions, null, 2);
    });

    copyBtn.addEventListener('click', async ()=>{
      try{ await navigator.clipboard.writeText(out.textContent); alert('Copied'); }catch(e){ alert('Clipboard failed'); }
    });

    dlBtn.addEventListener('click', ()=>{
      const data = out.textContent || '[]';
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='quiz-from-md.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });

    clearBtn.addEventListener('click', ()=>{ mdBox.value = ''; out.textContent = '[]'; errBox.textContent=''; });
  </script>
</body>
</html>
